services:
  - type: web
    name: app-release-center-notifications
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      - key: NODE_ENV
        value: production
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: DESKTOP_API_TOKEN
        sync: false
      - key: DETAIL_VIEW_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: app-release-center
      - key: FIREBASE_SERVICE_ACCOUNT_JSON_B64
        sync: false
